# render.yaml — Blueprint Render pour DevOnboard Copilot
# Déploie le backend FastAPI depuis le dashboard Render :
# New → Blueprint → coller l'URL du repo → Render lit ce fichier.
#
# ⚠️  Plan gratuit : pas de disque persistant → ChromaDB est éphémère.
#     L'index est perdu au redémarrage → il suffit de ré-indexer depuis l'UI.
#
# URL backend après déploiement : https://devonboard-backend.onrender.com

services:
  - type: web
    name: devonboard-backend
    runtime: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    plan: free
    envVars:
      - key: GROQ_API_KEY
        sync: false          # À renseigner manuellement dans le dashboard Render
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: CHROMA_PERSIST_DIR
        value: ./chroma_store
    healthCheckPath: /health
